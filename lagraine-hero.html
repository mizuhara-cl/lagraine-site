        <div style={{ display:'flex', flexDirection:'column', gap:5, padding:8, cursor:'pointer' }}>
          {[0,1,2].map(i => <div key={i} style={{ width:22, height:1.5, background: T.cream }} />)}
        </div>
      </div>

      <div style={{ position:'relative', padding:'52px 28px 44px', overflow:'hidden' }}>
        <svg style={{ position:'absolute', inset:0, width:'100%', height:'100%' }} viewBox="0 0 390 340" preserveAspectRatio="xMidYMid slice">
          <circle cx="320" cy="60" r="200" fill="none" stroke="rgba(255,255,255,0.04)" strokeWidth="50" />
          <ellipse cx="300" cy="200" rx="100" ry="150" fill="rgba(74,144,135,0.2)" transform="rotate(-15,300,200)" />
        </svg>
        <div style={{ position:'relative', zIndex:1 }}>
          <div style={{ display:'inline-flex', alignItems:'center', gap:8, marginBottom:28, padding:'5px 12px', background:'rgba(255,255,255,0.1)' }}>
            <div style={{ width:6, height:6, borderRadius:'50%', background: T.sage }} />
            <span style={{ fontSize:10, color:'rgba(255,255,255,0.7)', letterSpacing:'0.15em' }}>京都市・向日市・長岡京市</span>
          </div>
          <h1 style={{ fontFamily:"'Noto Serif JP',serif", fontWeight:300, fontSize:38, lineHeight:1.6, color: T.cream, marginBottom:20, letterSpacing:'0.08em' }}>
            ともにあり、<br />ともにあゆむ。
          </h1>
          <p style={{ fontSize:12, lineHeight:2, color:'rgba(247,243,238,0.65)', marginBottom:36 }}>
            らぐれーぬはフランス語で「たね」。<br />専門スタッフがご自宅でお支えします。
          </p>
          <button style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:12, letterSpacing:'0.12em', padding:'14px 0', background: T.cream, color: T.teal, border:'none', width:'100%', cursor:'pointer', fontWeight:500 }}>
            まずはご相談ください
          </button>
        </div>
      </div>

      <div style={{ background: T.cream, padding:'32px 28px' }}>
        <div style={{ fontSize:10, color: T.tealMid, letterSpacing:'0.2em', marginBottom:16 }}>このような悩みはありませんか</div>
        {['自分らしさがわからない','感情に振り回されて疲れる','悩みを話せる人がいない'].map(t=>(
          <div key={t} style={{ display:'flex', alignItems:'center', gap:10, fontSize:12, color: T.warmMid, marginBottom:10 }}>
            <div style={{ width:6, height:6, borderRadius:'50%', background: T.sage, flexShrink:0 }} />
            {t}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── App ─────────────────────────────────────────────── */
function App() {
  const [showTweaks, setShowTweaks] = React.useState(false);
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "activeVariant": "全案"
  }/*EDITMODE-END*/;
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);

  React.useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  const setTweak = (key, val) => {
    setTweaks(p => ({ ...p, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  return (
    <>
      <DesignCanvas>
        {/* Desktop row */}
        <DCSection title="ヒーロー案 — デスクトップ（1200px）" subtitle="3案を比較 · ピンチ/スクロールでナビゲート">
          <DCArtboard label="案A  ／  余白と書体" width={1200}>
            <HeroA />
          </DCArtboard>
        </DCSection>

        <DCSection title="" subtitle="">
          <DCArtboard label="案B  ／  スプリットレイアウト" width={1200}>
            <HeroB />
          </DCArtboard>
        </DCSection>

        <DCSection title="" subtitle="">
          <DCArtboard label="案C  ／  フルブリード・ディープテール" width={1200}>
            <HeroC />
          </DCArtboard>
        </DCSection>

        {/* Mobile row */}
        <DCSection title="モバイル（390px）" subtitle="案A・案Cのスマホ表示">
          <DCArtboard label="案A モバイル" width={390}>
            <MobileA />
          </DCArtboard>
          <DCArtboard label="案C モバイル" width={390}>
            <MobileC />
          </DCArtboard>
          <DCPostIt top={10} left={480} rotate={2} width={200}>
            案Bのモバイルも<br />必要な場合はお知らせを！
          </DCPostIt>
        </DCSection>
      </DesignCanvas>

      {/* Tweaks */}
      {showTweaks && (
        <div style={{
          position:'fixed', bottom:24, right:24, zIndex:9999,
          background:'#fff', border:'1px solid #e0d8d0',
          boxShadow:'0 4px 24px rgba(0,0,0,0.12)',
          padding:'20px', width:220,
          fontFamily:"'Noto Sans JP',sans-serif",
        }}>
          <div style={{ fontSize:12, fontWeight:500, color:'#2a2420', marginBottom:16, letterSpacing:'0.08em' }}>Tweaks</div>
          <div style={{ fontSize:11, color:'#9a8e85', marginBottom:10 }}>フォーカスする案</div>
          {['A','B','C','全案'].map(v => (
            <button key={v} onClick={() => setTweak('activeVariant', v)}
              style={{
                display:'block', width:'100%', textAlign:'left',
                padding:'8px 12px', marginBottom:4, fontSize:12,
                background: tweaks.activeVariant === v ? '#1d4f47' : 'transparent',
                color: tweaks.activeVariant === v ? '#f7f3ee' : '#5a5048',
                border:`1px solid ${tweaks.activeVariant === v ? '#1d4f47' : '#e0d8d0'}`,
                cursor:'pointer',
              }}
            >
              {v === '全案' ? '全案表示' : `案${v}にフォーカス`}
            </button>
          ))}
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
